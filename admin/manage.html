<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Contenuti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }
    .nav { margin-bottom: 32px; }
    .nav a {
      color: #e63946;
      text-decoration: none;
      font-size: 0.9rem;
      margin-right: 20px;
    }
    .nav a:hover { text-decoration: underline; }
    .content-list { display: flex; flex-direction: column; gap: 12px; }
    .content-item {
      background: #252540;
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-slug { font-size: 0.78rem; color: #666; }
    .item-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .item-tag {
      font-size: 0.7rem;
      background: #e63946;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .item-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-duplicate { background: #0f3460; color: #fff; }
    .btn-delete { background: #e63946; color: #fff; }
    .loading {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #252540;
      border-left: 4px solid #e63946;
      color: #fff;
      padding: 14px 20px;
      border-radius: 6px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }
    .toast.success { border-color: #2ecc71; }
    .not-logged {
      text-align: center;
      padding: 60px 20px;
    }
    .not-logged p { color: #888; margin-bottom: 20px; }
    .not-logged a {
      background: #e63946;
      color: #fff;
      padding: 12px 28px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 700;
    }
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .confirm-overlay.show { display: flex; }
    .confirm-box {
      background: #252540;
      border-radius: 8px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .confirm-box h3 { margin-bottom: 12px; }
    .confirm-box p { color: #aaa; margin-bottom: 24px; font-size: 0.9rem; }
    .confirm-actions { display: flex; gap: 12px; justify-content: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/admin/">Pannello CMS</a>
    <a href="/">Vedi sito</a>
  </div>
  <h1>Gestione Contenuti</h1>
  <p class="subtitle">Duplica o elimina i contenuti senza aprirli.</p>
  <div class="content-list" id="list">
    <div class="loading">Verifica accesso...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Conferma eliminazione</h3>
    <p id="confirm-text"></p>
    <div class="confirm-actions">
      <button class="btn btn-duplicate" onclick="closeConfirm()">Annulla</button>
      <button class="btn btn-delete" id="confirm-ok">Elimina</button>
    </div>
  </div>
</div>

<script>
  const REPO = 'NopWebGit/unife-portal';
  const BRANCH = 'main';
  const API_BASE = `https://api.github.com/repos/${REPO}`;
  const TOKEN_KEY = 'unife-manage-token';

  let token = null;

  function showToast(msg, success = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (success ? ' success' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  function parseFrontmatter(text) {
    const match = text.match(/^---\n([\s\S]*?)\n---/);
    if (!match) return { title: 'Senza titolo', tags: [] };
    const meta = {};
    match[1].split('\n').forEach(line => {
      const idx = line.indexOf(':');
      if (idx === -1) return;
      const key = line.substring(0, idx).trim();
      const val = line.substring(idx + 1).trim().replace(/^["']|["']$/g, '');
      meta[key] = val;
    });
    let tags = [];
    if (meta.tags) {
      try { tags = JSON.parse(meta.tags.replace(/'/g, '"')); }
      catch { tags = [meta.tags]; }
    }
    return { title: meta.title || 'Senza titolo', tags };
  }

  function showTokenForm() {
    document.getElementById('list').innerHTML = `
      <div style="background:#252540;border-radius:8px;padding:28px;max-width:500px;">
        <h3 style="margin-bottom:12px;">Accesso richiesto</h3>
        <p style="color:#aaa;font-size:0.9rem;margin-bottom:20px;">
          Inserisci un GitHub Personal Access Token con permesso <strong>repo</strong> per usare questa pagina.<br><br>
          Puoi crearlo su GitHub in <strong>Settings &gt; Developer settings &gt; Personal access tokens &gt; Tokens (classic)</strong>.
        </p>
        <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxx"
          style="width:100%;padding:10px 14px;border-radius:4px;border:1px solid #444;background:#1a1a2e;color:#fff;font-size:0.95rem;margin-bottom:14px;">
        <div style="display:flex;gap:10px;">
          <button class="btn btn-duplicate" onclick="saveToken()" style="flex:1;">Accedi</button>
          <button class="btn" onclick="clearToken()" style="background:#444;color:#fff;flex:0 0 auto;">Dimentica token</button>
        </div>
      </div>`;
  }

  function saveToken() {
    const val = document.getElementById('token-input').value.trim();
    if (!val) { showToast('Inserisci un token valido.'); return; }
    localStorage.setItem(TOKEN_KEY, val);
    token = val;
    loadList();
  }

  function clearToken() {
    localStorage.removeItem(TOKEN_KEY);
    token = null;
    showTokenForm();
  }

  async function githubRequest(path, method = 'GET', body = null) {
    const opts = {
      method,
      headers: {
        Authorization: `token ${token}`,
        'Content-Type': 'application/json'
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${API_BASE}/${path}`, opts);
    if (!res.ok) throw new Error(`Errore API: ${res.status}`);
    if (method === 'DELETE') return;
    return res.json();
  }

  async function loadList() {
    const list = document.getElementById('list');
    list.innerHTML = '<div class="loading">Caricamento...</div>';

    try {
      const files = await githubRequest(`contents/content?ref=${BRANCH}`);
      const mdFiles = files.filter(f => f.name.endsWith('.md'));

      if (mdFiles.length === 0) {
        list.innerHTML = '<div class="loading">Nessun contenuto presente.</div>';
        return;
      }

      const items = await Promise.all(mdFiles.map(async f => {
        const data = await githubRequest(`contents/${f.path}?ref=${BRANCH}`);
        const decoded = new TextDecoder().decode(
          Uint8Array.from(atob(data.content.replace(/\n/g, '')), c => c.charCodeAt(0))
        );
        const { title, tags } = parseFrontmatter(decoded);
        return { name: f.name, path: f.path, sha: data.sha, title, tags, rawContent: data.content };
      }));

      window._items = items;

      list.innerHTML = items.map(item => `
        <div class="content-item" id="item-${CSS.escape(item.name)}">
          <div class="item-info">
            <div class="item-title">${item.title}</div>
            <div class="item-slug">${item.name}</div>
            <div class="item-tags">${item.tags.map(t => `<span class="item-tag">${t}</span>`).join('')}</div>
          </div>
          <div class="item-actions">
            <button class="btn btn-duplicate" onclick="duplicate('${item.name}')">Duplica</button>
            <button class="btn btn-delete" onclick="askDelete('${item.name}', '${item.path}', '${item.sha}', \`${item.title.replace(/`/g, "'")}\`)">Elimina</button>
          </div>
        </div>`).join('');

    } catch (e) {
      if (e.message.includes('401') || e.message.includes('403')) {
        localStorage.removeItem(TOKEN_KEY);
        showToast('Token non valido. Inseriscine uno nuovo.');
        showTokenForm();
      } else {
        list.innerHTML = `<div class="loading">Errore: ${e.message}</div>`;
      }
    }
  }

  async function duplicate(name) {
    const item = window._items.find(i => i.name === name);
    if (!item) return;

    const base = name.replace('.md', '');
    const newName = `${base}-copia-${Date.now()}.md`;
    const newPath = `content/${newName}`;

    const btn = document.querySelector(`[onclick="duplicate('${name}')"]`);
    if (btn) { btn.disabled = true; btn.textContent = 'Duplicazione...'; }

    try {
      await githubRequest(`contents/${newPath}`, 'PUT', {
        message: `Duplica ${name}`,
        content: item.rawContent.replace(/\n/g, ''),
        branch: BRANCH
      });
      showToast('Contenuto duplicato con successo.', true);
      setTimeout(loadList, 1500);
    } catch (e) {
      showToast('Errore durante la duplicazione: ' + e.message);
      if (btn) { btn.disabled = false; btn.textContent = 'Duplica'; }
    }
  }

  let pendingDelete = null;

  function askDelete(name, path, sha, title) {
    pendingDelete = { name, path, sha };
    document.getElementById('confirm-text').textContent =
      `Stai per eliminare "${title}". Questa azione non è reversibile.`;
    document.getElementById('confirm-overlay').classList.add('show');
    document.getElementById('confirm-ok').onclick = confirmDelete;
  }

  function closeConfirm() {
    document.getElementById('confirm-overlay').classList.remove('show');
    pendingDelete = null;
  }

  async function confirmDelete() {
    if (!pendingDelete) return;
    const { name, path, sha } = pendingDelete;
    closeConfirm();

    try {
      await githubRequest(`contents/${path}`, 'DELETE', {
        message: `Elimina ${name}`,
        sha,
        branch: BRANCH
      });
      showToast('Contenuto eliminato.', true);
      setTimeout(loadList, 1500);
    } catch (e) {
      showToast('Errore durante l\'eliminazione: ' + e.message);
    }
  }

  // Avvio
  token = localStorage.getItem(TOKEN_KEY);
  if (token) {
    loadList();
  } else {
    showTokenForm();
  }
</script>
</body>
</html>
